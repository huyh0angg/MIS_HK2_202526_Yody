<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Yody Fashion</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
        }
        .login-container {
            display: flex;
            height: 100vh;
        }
        .login-left {
            flex: 1;
            background: linear-gradient(135deg, #87ceeb 0%, #e0ac69 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .login-left::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            top: -50px;
            left: -50px;
        }
        .login-left::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            bottom: -100px;
            right: -100px;
        }
        .left-content {
            position: relative;
            z-index: 2;
            text-align: left;
            padding: 40px;
            color: white;
            max-width: 400px;
        }
        .left-content h2 {
            font-size: 36px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        .features {
            list-style: none;
        }
        .features li {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .features li::before {
            content: '❤️';
            margin-right: 12px;
            font-size: 18px;
        }
        .login-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: white;
            padding: 60px;
        }
        .form-container {
            width: 100%;
            max-width: 400px;
        }
        .logo {
            font-size: 32px;
            font-weight: 700;
            color: #001a33;
            margin-bottom: 40px;
            text-align: center;
            text-decoration: none;
            display: block;
            transition: color 0.3s;
            cursor: pointer;
        }
        .logo:hover {
            color: #ff8c00;
        }
        .form-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }
        .form-tabs button {
            background: none;
            border: none;
            padding: 12px 0;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            color: #999;
            position: relative;
            transition: color 0.3s;
        }
        .form-tabs button.active {
            color: #ff8c00;
        }
        .form-tabs button.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 3px;
            background-color: #ff8c00;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #ff8c00;
            box-shadow: 0 0 0 3px rgba(255, 140, 0, 0.1);
        }
        .form-group input::placeholder {
            color: #b0b0b0;
        }
        .forgot-password {
            text-align: right;
            margin-bottom: 30px;
        }
        .forgot-password a {
            color: #999;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.3s;
        }
        .forgot-password a:hover {
            color: #ff8c00;
        }
        .login-button {
            width: 100%;
            padding: 14px;
            background-color: #ff8c00;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .login-button:hover {
            background-color: #e67e00;
        }
        .signup-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #999;
        }
        .signup-link a {
            color: #ff8c00;
            text-decoration: none;
            font-weight: 600;
        }
        @media (max-width: 768px) {
            .login-container {
                flex-direction: column;
            }
            .login-left {
                min-height: 300px;
            }
            .login-right {
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-left">
            <div class="left-content">
                <h2>Khám phá phong cách của bạn cùng Yody</h2>
                <ul class="features">
                    <li>Lưu lại các trang phục yêu thích</li>
                    <li>Theo dõi đơn hàng dễ dàng</li>
                    <li>Nhận ưu đãi độc quyền</li>
                    <li>Gợi ý cá nhân hóa cho bạn</li>
                </ul>
            </div>
        </div>
        <div class="login-right">
            <div class="form-container">
                <a href="home.html" class="logo">Yody</a>
                
                <div class="form-tabs">
                    <button class="active">Đăng nhập</button>
                    <button onclick="window.location.href='register.html'">Đăng ký</button>
                </div>

                <form>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Nhập email của bạn" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Mật khẩu</label>
                        <input type="password" id="password" placeholder="Nhập mật khẩu" required>
                    </div>

                    <div class="forgot-password">
                        <a href="#">Quên mật khẩu?</a>
                    </div>

                    <button type="submit" class="login-button">Đăng nhập</button>
                </form>

                <div class="signup-link">
                    Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
